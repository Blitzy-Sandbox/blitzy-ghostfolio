<div class="container">
  <!--
    Heading hierarchy fix (QA Checkpoint 8 Issue #6, WCAG 1.3.1
    Info and Relationships): the previous `<h1 class="d-none d-sm-block
    h3 mb-3 text-center">Holdings</h1>` element was nested INSIDE the
    `<gf-module-wrapper>`'s `<h2>Holdings</h2>` title bar (when this
    component is rendered as a dashboard module). That broke the
    document heading hierarchy by introducing an h1 deep within the
    page structure, confusing screen readers about page organization.

    The h1 is removed entirely — the module wrapper's h2 is the only
    heading needed to identify this section of the canvas, and the
    visually-hidden duplicate provided no additional information to
    sighted or assistive-tech users. Removing the element also
    eliminates the `d-none d-sm-block` Bootstrap utility classes that
    were rendering the heading only on screens >= 576 px wide
    (mobile/responsive behavior is out of scope per AAP § 0.7.3, so
    the conditional visibility was already vestigial).
  -->
  <div class="row">
    <div class="col-lg">
      <div class="d-flex">
        <div class="d-flex">
          <div class="d-none d-lg-block">
            <mat-button-toggle-group
              [formControl]="viewModeFormControl"
              [hideSingleSelectionIndicator]="true"
            >
              <mat-button-toggle i18n-title title="Table" value="TABLE">
                <ion-icon name="reorder-four-outline" />
              </mat-button-toggle>
              <mat-button-toggle i18n-title title="Chart" value="CHART">
                <ion-icon name="grid-outline" />
              </mat-button-toggle>
            </mat-button-toggle-group>
          </div>
        </div>
        <div class="align-items-center d-flex flex-grow-1 justify-content-end">
          <gf-toggle
            class="d-none d-lg-block"
            [defaultValue]="holdingType"
            [isLoading]="false"
            [options]="holdingTypeOptions"
            (valueChange)="onChangeHoldingType($event.value)"
          />
        </div>
      </div>
      @if (viewModeFormControl.value === 'CHART') {
        <gf-treemap-chart
          class="mt-3"
          cursor="pointer"
          [baseCurrency]="user?.settings?.baseCurrency"
          [colorScheme]="user?.settings?.colorScheme"
          [dateRange]="user?.settings?.dateRange"
          [holdings]="holdings"
          [locale]="user?.settings?.locale"
          (treemapChartClicked)="onHoldingClicked($event)"
        />
      }
      <div [ngClass]="{ 'd-none': viewModeFormControl.value !== 'TABLE' }">
        <gf-holdings-table
          [holdings]="holdings"
          [locale]="user?.settings?.locale"
          (holdingClicked)="onHoldingClicked($event)"
        />
        @if (
          !hasImpersonationId &&
          hasPermissionToCreateActivity &&
          holdings?.length > 0
        ) {
          <div class="text-center">
            <a
              class="mt-3"
              i18n
              mat-stroked-button
              [routerLink]="routerLinkPortfolioActivities"
              >Manage Activities</a
            >
          </div>
        }
      </div>
    </div>
  </div>
</div>
